name: Build Docker Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'book/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run runtime and API checks
        env:
          RBOOK_CONTENT_DIR: ${{ github.workspace }}/book
          RBOOK_CODE_DIR: ${{ github.workspace }}/book/code
          RBOOK_RUNTIME_DIR: /tmp/rbook-runtime-check
          RBOOK_TEST_STATIC_DIR: /tmp/rbook-runtime-check/dist
        run: |
          npm run typecheck
          npm run build:runtime
          npm run test:api

      - name: Set image metadata
        id: meta
        run: |
          IMAGE="$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')"
          TAG="${GITHUB_SHA::12}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
