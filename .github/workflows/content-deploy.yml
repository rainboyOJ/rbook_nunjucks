name: Deploy Content to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'book/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  FALLBACK_IMAGE: gh-proxy.org/docker/ghcr.io/rainboyoj/rbook_nunjucks:latest
  CONTAINER_NAME: rbook
  CONTAINER_PORT: 3000
  HOST_PORT: 3000
  VPS_REPO_DIR: /opt/rbook/rbook_nunjucks
  VPS_REPO_BRANCH: main
  VPS_REPO_URL: https://gh-proxy.com/https://github.com/${{ github.repository }}.git

jobs:
  deploy-content:
    runs-on: ubuntu-latest
    environment: bohai
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed paths
        id: changes
        run: |
          if [ '${{ github.event_name }}' = 'workflow_dispatch' ]; then
            echo "deploy_content=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch; deploying content."
            exit 0
          fi

          changed_files="$(git diff --name-only '${{ github.event.before }}' '${{ github.sha }}')"
          if [ -z "$changed_files" ]; then
            echo "deploy_content=false" >> "$GITHUB_OUTPUT"
            echo "No changed files found; skipping content deploy."
            exit 0
          fi

          non_book_files="$(printf '%s\n' "$changed_files" | grep -v '^book/' || true)"
          if [ -n "$non_book_files" ]; then
            echo "deploy_content=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping content deploy because this push also changed non-book files. Docker deploy will handle it after the image is built."
            printf 'Non-book files:\n%s\n' "$non_book_files"
            exit 0
          fi

          echo "deploy_content=true" >> "$GITHUB_OUTPUT"
          echo "Only book files changed; deploying content with the current image."

      - name: Prepare SSH
        if: steps.changes.outputs.deploy_content == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_SSH_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy content on VPS
        if: steps.changes.outputs.deploy_content == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          HOST_PORT: ${{ secrets.RBOOK_HOST_PORT || env.HOST_PORT }}
          CONTAINER_PORT: ${{ env.CONTAINER_PORT }}
          RBOOK_ADMIN_TOKEN: ${{ secrets.RBOOK_ADMIN_TOKEN }}
          VPS_REPO_DIR: ${{ env.VPS_REPO_DIR }}
          VPS_REPO_BRANCH: ${{ env.VPS_REPO_BRANCH }}
          VPS_REPO_URL: ${{ env.VPS_REPO_URL }}
          FALLBACK_IMAGE: ${{ env.FALLBACK_IMAGE }}
        run: |
          ssh \
            -p "$VPS_SSH_PORT" \
            -i ~/.ssh/deploy_key \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes \
            "$VPS_USER@$VPS_HOST" \
            "CONTAINER_NAME='$CONTAINER_NAME' HOST_PORT='$HOST_PORT' CONTAINER_PORT='$CONTAINER_PORT' RBOOK_ADMIN_TOKEN='$RBOOK_ADMIN_TOKEN' VPS_REPO_DIR='$VPS_REPO_DIR' VPS_REPO_BRANCH='$VPS_REPO_BRANCH' VPS_REPO_URL='$VPS_REPO_URL' FALLBACK_IMAGE='$FALLBACK_IMAGE' bash -se" <<'REMOTE'
          set -euo pipefail

          wait_for_health() {
            local health_url="http://127.0.0.1:${HOST_PORT}/api/health"
            local response=""

            echo "Waiting for $health_url"
            for attempt in $(seq 1 60); do
              if response="$(curl -fsS --max-time 5 "$health_url" 2>/tmp/rbook-health-error.log)"; then
                if printf '%s' "$response" | docker exec -i "$CONTAINER_NAME" node -e '
                  let body = "";
                  process.stdin.on("data", (chunk) => {
                    body += chunk;
                  });
                  process.stdin.on("end", () => {
                    const health = JSON.parse(body);
                    if (health.ok !== true) {
                      throw new Error("health.ok is not true");
                    }
                    if (!health.stats || health.stats.errors !== 0) {
                      throw new Error(`health.stats.errors is ${health.stats?.errors}`);
                    }
                  });
                ' >/dev/null 2>/tmp/rbook-health-parse-error.log; then
                  echo "Health check passed"
                  return 0
                fi
              fi

              echo "Health check attempt ${attempt}/60 failed; retrying in 5s"
              sleep 5
            done

            echo "Health check failed"
            echo "Last curl error:"
            cat /tmp/rbook-health-error.log 2>/dev/null || true
            echo "Last health response:"
            printf '%s\n' "$response"
            echo "Last parse error:"
            cat /tmp/rbook-health-parse-error.log 2>/dev/null || true
            echo "Container logs:"
            docker logs --tail 200 "$CONTAINER_NAME" || true
            return 1
          }

          if [ ! -d "$VPS_REPO_DIR/.git" ]; then
            echo "Initializing sparse content repo in $VPS_REPO_DIR"
            rm -rf "$VPS_REPO_DIR"
            mkdir -p "$VPS_REPO_DIR"
            git -C "$VPS_REPO_DIR" init
            git -C "$VPS_REPO_DIR" remote add origin "$VPS_REPO_URL"
          fi

          git -C "$VPS_REPO_DIR" remote set-url origin "$VPS_REPO_URL"
          git -C "$VPS_REPO_DIR" sparse-checkout init --cone
          git -C "$VPS_REPO_DIR" sparse-checkout set \
            book
          git -C "$VPS_REPO_DIR" fetch --depth=1 origin "$VPS_REPO_BRANCH"
          git -C "$VPS_REPO_DIR" reset --hard "origin/$VPS_REPO_BRANCH"

          IMAGE="$(docker inspect --format '{{.Config.Image}}' "$CONTAINER_NAME" 2>/dev/null || true)"
          if [ -z "$IMAGE" ]; then
            IMAGE="$FALLBACK_IMAGE"
            echo "No running image found; pulling fallback $IMAGE"
            timeout 10m docker pull --quiet "$IMAGE"
          else
            echo "Reusing current image $IMAGE"
          fi

          TEST_NAME="${CONTAINER_NAME}-content-test"
          docker rm -f "$TEST_NAME" >/dev/null 2>&1 || true
          docker run --rm \
            --name "$TEST_NAME" \
            -e NODE_ENV=production \
            -e RBOOK_CONTENT_DIR=/content \
            -e RBOOK_RUNTIME_DIR=/tmp/rbook-runtime \
            -v "$VPS_REPO_DIR/book:/content:ro" \
            "$IMAGE" \
            npm run build:runtime

          docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true
          docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            -p "${HOST_PORT}:${CONTAINER_PORT}" \
            -e NODE_ENV=production \
            -e HOST=0.0.0.0 \
            -e PORT="$CONTAINER_PORT" \
            -e RBOOK_ADMIN_TOKEN="$RBOOK_ADMIN_TOKEN" \
            -e RBOOK_CONTENT_DIR=/content \
            -e RBOOK_RUNTIME_DIR=/tmp/rbook-runtime \
            -v "$VPS_REPO_DIR/book:/content:ro" \
            "$IMAGE"

          docker ps --filter "name=$CONTAINER_NAME"
          wait_for_health
          REMOTE
