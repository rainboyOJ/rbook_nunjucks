name: Deploy to VPS

on:
  workflow_run:
    workflows:
      - Build Docker Image
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy. Defaults to latest.
        required: false
        default: latest

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  PULL_PROXY_PREFIX: gh-proxy.org/docker
  CONTAINER_NAME: rbook
  CONTAINER_PORT: 3000
  HOST_PORT: 3000
  VPS_REPO_DIR: /opt/rbook/rbook_nunjucks
  VPS_REPO_BRANCH: main
  VPS_REPO_URL: https://gh-proxy.com/https://github.com/${{ github.repository }}.git

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: bohai
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          IMAGE="$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')"
          if [ '${{ github.event_name }}' = 'workflow_dispatch' ]; then
            TAG='${{ inputs.image_tag }}'
          else
            TAG="$(printf '%s' '${{ github.event.workflow_run.head_sha }}' | cut -c1-12)"
          fi

          echo "image=${{ env.PULL_PROXY_PREFIX }}/$IMAGE:$TAG" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_SSH_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          IMAGE: ${{ steps.meta.outputs.image }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          HOST_PORT: ${{ secrets.RBOOK_HOST_PORT || env.HOST_PORT }}
          CONTAINER_PORT: ${{ env.CONTAINER_PORT }}
          RBOOK_ADMIN_TOKEN: ${{ secrets.RBOOK_ADMIN_TOKEN }}
          VPS_REPO_DIR: ${{ env.VPS_REPO_DIR }}
          VPS_REPO_BRANCH: ${{ env.VPS_REPO_BRANCH }}
          VPS_REPO_URL: ${{ env.VPS_REPO_URL }}
        run: |
          REMOTE_SCRIPT="/tmp/rbook-deploy-vps-${GITHUB_SHA}.sh"
          scp \
            -P "$VPS_SSH_PORT" \
            -i ~/.ssh/deploy_key \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes \
            scripts/deploy-vps.sh \
            "$VPS_USER@$VPS_HOST:$REMOTE_SCRIPT"

          ssh \
            -p "$VPS_SSH_PORT" \
            -i ~/.ssh/deploy_key \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes \
            "$VPS_USER@$VPS_HOST" \
            "DEPLOY_MODE='image' IMAGE='$IMAGE' CONTAINER_NAME='$CONTAINER_NAME' HOST_PORT='$HOST_PORT' CONTAINER_PORT='$CONTAINER_PORT' RBOOK_ADMIN_TOKEN='$RBOOK_ADMIN_TOKEN' VPS_REPO_DIR='$VPS_REPO_DIR' VPS_REPO_BRANCH='$VPS_REPO_BRANCH' VPS_REPO_URL='$VPS_REPO_URL' bash '$REMOTE_SCRIPT'"
