name: Deploy to VPS

on:
  workflow_run:
    workflows:
      - Build Docker Image
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy. Defaults to latest.
        required: false
        default: latest

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  CONTAINER_NAME: rbook
  CONTAINER_PORT: 3000
  HOST_PORT: 3000

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: bohai
    timeout-minutes: 15
    steps:
      - name: Set image metadata
        id: meta
        run: |
          IMAGE="$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')"
          if [ '${{ github.event_name }}' = 'workflow_dispatch' ]; then
            TAG='${{ inputs.image_tag }}'
          else
            TAG="$(printf '%s' '${{ github.event.workflow_run.head_sha }}' | cut -c1-12)"
          fi

          echo "image=${IMAGE/ghcr.io/ghcr.nju.edu.cn}:$TAG" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_SSH_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          IMAGE: ${{ steps.meta.outputs.image }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          HOST_PORT: ${{ secrets.RBOOK_HOST_PORT || env.HOST_PORT }}
          CONTAINER_PORT: ${{ env.CONTAINER_PORT }}
          RBOOK_ADMIN_TOKEN: ${{ secrets.RBOOK_ADMIN_TOKEN }}
        run: |
          ssh \
            -p "$VPS_SSH_PORT" \
            -i ~/.ssh/deploy_key \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes \
            "$VPS_USER@$VPS_HOST" \
            "IMAGE='$IMAGE' CONTAINER_NAME='$CONTAINER_NAME' HOST_PORT='$HOST_PORT' CONTAINER_PORT='$CONTAINER_PORT' RBOOK_ADMIN_TOKEN='$RBOOK_ADMIN_TOKEN' bash -se" <<'REMOTE'
          set -euo pipefail

          echo "Pulling $IMAGE"
          timeout 10m docker pull --quiet "$IMAGE"
          echo "Pulled $IMAGE"

          docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true

          docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            -p "${HOST_PORT}:${CONTAINER_PORT}" \
            -e NODE_ENV=production \
            -e HOST=0.0.0.0 \
            -e PORT="$CONTAINER_PORT" \
            -e RBOOK_ADMIN_TOKEN="$RBOOK_ADMIN_TOKEN" \
            "$IMAGE"

          docker image prune -f
          docker ps --filter "name=$CONTAINER_NAME"
          REMOTE
