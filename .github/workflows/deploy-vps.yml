name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-static-site:
    runs-on: ubuntu-latest
    environment: bohai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build static site
        run: npm run build

      - name: Package static site
        run: |
          tar -C dist -czf "rbook-dist-${GITHUB_SHA}.tar.gz" .

      - name: Prepare SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_SSH_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload package to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
        run: |
          scp -P "$VPS_SSH_PORT" -i ~/.ssh/deploy_key \
            "rbook-dist-${GITHUB_SHA}.tar.gz" \
            "$VPS_USER@$VPS_HOST:/tmp/rbook-dist-${GITHUB_SHA}.tar.gz"

      - name: Deploy package on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_DEPLOY_DIR: ${{ secrets.VPS_DEPLOY_DIR }}
        run: |
          DEPLOY_DIR="${VPS_DEPLOY_DIR:-/www/wwwroot/rbook2.roj.ac.cn}"
          ssh -p "$VPS_SSH_PORT" -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "DEPLOY_DIR='$DEPLOY_DIR' ARCHIVE='/tmp/rbook-dist-${GITHUB_SHA}.tar.gz' bash -se" <<'REMOTE'
          mkdir -p "$DEPLOY_DIR"
          find "$DEPLOY_DIR" -mindepth 1 -maxdepth 1 ! -name '.user.ini' -exec rm -rf -- {} +
          tar -xzf "$ARCHIVE" -C "$DEPLOY_DIR"
          rm -f "$ARCHIVE"
          REMOTE
